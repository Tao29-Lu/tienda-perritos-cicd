name: Deploy Tienda Perritos to EKS

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 099937846902.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER_NAME: tienda-perritos-eks

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login en Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push backend
        run: |
          docker build -t tienda-backend ./backend
          docker tag tienda-backend:latest $ECR_REGISTRY/tienda-backend:latest
          docker push $ECR_REGISTRY/tienda-backend:latest

      - name: Build y push frontend
        run: |
          docker build -t tienda-frontend ./frontend
          docker tag tienda-frontend:latest $ECR_REGISTRY/tienda-frontend:latest
          docker push $ECR_REGISTRY/tienda-frontend:latest

      - name: Configurar kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER_NAME

      - name: Aplicar manifiestos Kubernetes
        run: |
          kubectl apply -f k8s/

      - name: Reiniciar deployments
        run: |
          kubectl rollout restart deployment/backend-deployment
          kubectl rollout restart deployment/frontend-deployment
          kubectl rollout status deployment/backend-deployment
          kubectl rollout status deployment/frontend-deployment

      - name: Evidencia del despliegue
        run: |
          kubectl get nodes -o wide
          kubectl get deployments
          kubectl get pods -o wide
          kubectl get services -o wide
          kubectl get hpa