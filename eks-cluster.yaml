apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: tienda-perritos-eks
  region: us-east-1
  version: "1.30"

iam:
  serviceRoleARN: arn:aws:iam::099937846902:role/LabRole

managedNodeGroups:
  - name: tienda-nodes
    instanceType: t3.small
    desiredCapacity: 2
    minSize: 1
    maxSize: 3
    iam:
      instanceRoleARN: arn:aws:iam::099937846902:role/LabRole